<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UKPBJ BPS</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    
    <style>
        /* ANIMASI TEKS MEMVERIFIKASI */
        .verifying-text {
            font-weight: 600;
            color: #64748b;
            display: inline-block;
            animation: pulse-color 2s infinite ease-in-out;
        }

        @keyframes pulse-color {
            0%, 100% { 
                opacity: 1; 
                color: #64748b; 
                transform: scale(1);
            }
            50% { 
                opacity: 0.5; 
                color: #2563eb; /* Berubah ke biru saat redup */
                transform: scale(0.95);
            }
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <!-- ... sisa isi body sama seperti sebelumnya ... -->
    <div class="card shadow-lg border-0 text-center login-card">
        <div class="card-body p-5">
            <div class="login-icon mb-3 mx-auto"><i class="bi bi-shield-lock-fill"></i></div>
            <h3 class="fw-800 text-primary mb-2">Sistem Informasi PAK</h3>
            <h3 class="fw-800 text-primary mb-2">UKPBJ BPS</h3>
            <p class="text-muted small mb-4">Masuk praktis menggunakan akun Google Anda</p>
            
            <div id="buttonDiv" class="d-flex justify-content-center"></div>
            <div id="loginStatus" class="mt-3 small text-danger" style="display:none;">
                Email Anda tidak terdaftar dalam sistem.
            </div>

            <div class="mt-4 p-3 bg-light rounded-3 small border text-start">
                <div class="fw-bold text-primary mb-1"><i class="bi bi-info-circle"></i> Catatan:</div>
                Pastikan email Google Anda sudah didaftarkan oleh Admin! 
            </div>
        </div>
    </div>

    <script src="assets/js/auth.js"></script>
</body>
</html>
